<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_ | Definition</title>

    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="./newEntry.css">

    <script src="../../components/nav-bar.js"></script>
    <script src="./newEntry.js" defer></script>
</head>
<body>
    <nav-bar></nav-bar>

    <!-- 
        New Term form:

        Fill out:
            Enter the term
            Enter a definition
            Add tags
            Remove tags
            
        Submit
            New Tag wizard/popup
            "Duplicate" error message
            On success -> Navigate to definition page
    -->

    <div class="center-container">
        <form id="new-definition">
            
            <div class="form-group">
                <label for="entry-term">Term</label>
                <input type="text" id="entry-term" name="term" required>
            </div>
    
            <div class="form-group" id="entry-tags">
                <span class="def-tag">Bodily Function</span>
                <span class="def-tag">NSFW</span>
            </div>
        
            <div class="form-group" id="entry-content-area">
                <label for="entry-content">Definition</label>
                <textarea id="entry-content" name="definition" rows="5" required></textarea>
            </div>
            
            <div class="form-group form-bottom">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
    
</body>
</html>
